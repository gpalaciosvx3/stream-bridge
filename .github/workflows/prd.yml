name: PRD · AWS

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    if: github.event_name == 'pull_request'
    name: Validación y pruebas
    runs-on: ubuntu-latest
    environment: deployer-prd
    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar caché de dependencias
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}

      - name: Instalar dependencias
        run: npm install && cd cdk && npm install

      - name: Verificación de tipos
        run: npm run build

      - name: Validar plantilla CDK
        working-directory: cdk
        env:
          CDK_STAGE: prd
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: npx cdk synth --quiet

      - name: Guardar caché de dependencias
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}

  deploy:
    if: github.event_name == 'push'
    name: Despliegue en PRD (pendiente)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Entorno PRD pendiente de configuración."
        shell: bash
