name: DEV · AWS

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  build:
    if: github.event_name == 'pull_request'
    name: Validación y pruebas
    runs-on: ubuntu-latest
    environment: deployer-dev
    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar caché de dependencias
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}

      - name: Instalar dependencias
        run: npm install && cd cdk && npm install

      - name: Verificación de tipos
        run: npm run build

      - name: Pruebas unitarias
        run: npm test

      - name: Validar plantilla CDK
        working-directory: cdk
        env:
          CDK_STAGE: dev
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: npx cdk synth --quiet

      - name: Guardar caché de dependencias
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}

  deploy:
    if: github.event_name == 'push'
    name: Despliegue en AWS DEV
    runs-on: ubuntu-latest
    environment: deployer-dev
    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar caché de dependencias
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}

      - name: Instalar dependencias
        run: npm install && cd cdk && npm install

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Bootstrap del entorno CDK
        working-directory: cdk
        env:
          CDK_STAGE: dev
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: npx cdk bootstrap aws://${{ secrets.CDK_DEFAULT_ACCOUNT }}/${{ secrets.AWS_DEFAULT_REGION }}

      - name: Desplegar stack en AWS DEV
        working-directory: cdk
        env:
          CDK_STAGE: dev
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: npx cdk deploy --require-approval never --all

      - name: Guardar caché de dependencias
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            cdk/node_modules
          key: deps-${{ hashFiles('package.json', 'cdk/package.json') }}
